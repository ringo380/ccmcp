# Config reference: https://goreleaser.com/customization/
version: 2

project_name: ccmcp

before:
  hooks:
    - go mod tidy

builds:
  - id: ccmcp
    main: .
    binary: ccmcp
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}

archives:
  - id: default
    # Users most often want the bare binary; ship tar.gz for unix and zip for nothing
    # (no windows builds). Include README + LICENSE in the archive.
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    files:
      - README.md
      - LICENSE
      - CHANGELOG.md

checksum:
  name_template: 'checksums.txt'
  algorithm: sha256

snapshot:
  version_template: '{{ .Tag }}-next'

changelog:
  # Derive release notes from git log since the previous tag, grouped by conventional-
  # commit prefix. Skips chores/docs/ci so the published notes focus on user-visible work.
  use: git
  sort: asc
  groups:
    - title: Features
      regexp: '^.*?feat(\(.+\))??!?:.+$'
      order: 0
    - title: Bug fixes
      regexp: '^.*?fix(\(.+\))??!?:.+$'
      order: 1
    - title: Refactors
      regexp: '^.*?refactor(\(.+\))??!?:.+$'
      order: 2
    - title: Other
      order: 999
  filters:
    exclude:
      - '^chore'
      - '^docs'
      - '^ci'
      - '^test'
      - 'Merge pull request'
      - 'Merge branch'

release:
  draft: false
  prerelease: auto
  # Prepend an install blurb so release pages have a working copy-paste line.
  header: |
    ## Install

    ```sh
    go install github.com/ringo380/ccmcp@{{ .Tag }}
    ```

    Or grab a prebuilt binary for your platform from the Assets below and drop it in `~/bin`.
