# Config reference: https://goreleaser.com/customization/
version: 2

project_name: ccmcp

before:
  hooks:
    - go mod tidy

builds:
  - id: ccmcp
    main: .
    binary: ccmcp
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}

archives:
  - id: default
    # Users most often want the bare binary; ship tar.gz for unix and zip for nothing
    # (no windows builds). Include README + LICENSE in the archive.
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    files:
      - README.md
      - LICENSE
      - CHANGELOG.md

checksum:
  name_template: 'checksums.txt'
  algorithm: sha256

snapshot:
  version_template: '{{ .Tag }}-next'

changelog:
  # Derive release notes from git log since the previous tag, grouped by conventional-
  # commit prefix. Skips chores/docs/ci so the published notes focus on user-visible work.
  use: git
  sort: asc
  groups:
    - title: Features
      regexp: '^.*?feat(\(.+\))??!?:.+$'
      order: 0
    - title: Bug fixes
      regexp: '^.*?fix(\(.+\))??!?:.+$'
      order: 1
    - title: Refactors
      regexp: '^.*?refactor(\(.+\))??!?:.+$'
      order: 2
    - title: Other
      order: 999
  filters:
    exclude:
      - '^chore'
      - '^docs'
      - '^ci'
      - '^test'
      - 'Merge pull request'
      - 'Merge branch'

release:
  draft: false
  prerelease: auto
  # Prepend an install blurb so release pages have a working copy-paste line.
  header: |
    ## Install

    ```sh
    brew install ringo380/tap/ccmcp
    ```

    Or via Go toolchain:

    ```sh
    go install github.com/ringo380/ccmcp@{{ .Tag }}
    ```

    Or grab a prebuilt binary for your platform from the Assets below and drop it in `~/bin`.

# Homebrew formula is auto-regenerated on each non-prerelease tag and pushed to
# ringo380/homebrew-tap. Requires a HOMEBREW_TAP_TOKEN secret (PAT with contents:write
# on the tap repo) exposed to the release workflow. See .github/workflows/release.yml.
brews:
  - name: ccmcp
    repository:
      owner: ringo380
      name: homebrew-tap
      branch: main
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    directory: Formula
    commit_author:
      name: goreleaserbot
      email: bot@goreleaser.com
    commit_msg_template: "chore(formula): bump {{ .ProjectName }} to {{ .Tag }}"
    homepage: "https://github.com/ringo380/ccmcp"
    description: "Dynamic CLI + TUI for managing Claude Code MCP servers, plugins, and per-project overrides"
    license: "MIT"
    # Only publish the formula on actual (non-prerelease) tags.
    skip_upload: auto
    install: |
      bin.install "ccmcp"
    test: |
      assert_match "ccmcp version", shell_output("#{bin}/ccmcp --version")
