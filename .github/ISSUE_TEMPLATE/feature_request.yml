name: Feature request
description: Propose a new capability or improvement
title: "[feature] "
labels: ["type:feature", "status:needs-triage"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user pain or gap motivates this?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Sketch the desired behavior. UX details welcome.
    validations:
      required: true
  - type: dropdown
    id: surface
    attributes:
      label: Surface
      multiple: true
      options:
        - TUI
        - CLI
        - Config / on-disk state
        - Discovery
        - Doctor
        - Plugins
        - MCP
        - Profiles
        - Release / packaging
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: checkboxes
    id: checks
    attributes:
      label: Pre-flight
      options:
        - label: I searched existing issues and the roadmap
          required: true
