# Declarative label taxonomy for ringo380/ccmcp.
# Apply with: ./scripts/apply-labels.sh
# Each entry: name, color (6-hex, no #), description.

# --- Type ---
- name: "type:bug"
  color: "B60205"
  description: "Defect in existing behavior"
- name: "type:feature"
  color: "5319E7"
  description: "New user-facing capability"
- name: "type:chore"
  color: "BFD4F2"
  description: "Maintenance, deps, tooling"
- name: "type:refactor"
  color: "7E57C2"
  description: "Internal restructuring, no behavior change"
- name: "type:perf"
  color: "9C27B0"
  description: "Performance improvement"
- name: "type:test"
  color: "C5CAE9"
  description: "Test coverage or test infra"
- name: "type:docs"
  color: "0075CA"
  description: "Documentation only"
- name: "type:security"
  color: "8B0000"
  description: "Security-impacting change"

# --- Area ---
- name: "area:tui"
  color: "1F77B4"
  description: "Bubbletea TUI surface"
- name: "area:cli"
  color: "1F77B4"
  description: "Cobra CLI surface"
- name: "area:config"
  color: "4A90E2"
  description: "~/.claude.json and config mutation logic"
- name: "area:discovery"
  color: "4A90E2"
  description: "Marketplace discovery sources/manifest"
- name: "area:doctor"
  color: "4A90E2"
  description: "Doctor lint + autofix"
- name: "area:plugins"
  color: "4A90E2"
  description: "Plugin install/update/enable"
- name: "area:mcp"
  color: "4A90E2"
  description: "MCP server stash/restore/scope"
- name: "area:profiles"
  color: "4A90E2"
  description: "Profile save/apply/share"
- name: "area:install"
  color: "6BAED6"
  description: "Plugin install flow"
- name: "area:selfupdate"
  color: "6BAED6"
  description: "ccmcp self-update path"
- name: "area:release"
  color: "9ECAE1"
  description: "Goreleaser + Homebrew tap"
- name: "area:ci"
  color: "9ECAE1"
  description: "GitHub Actions workflows"
- name: "area:packaging"
  color: "9ECAE1"
  description: "Distribution: brew, apt, rpm, etc."

# --- Priority ---
- name: "P0-critical"
  color: "B60205"
  description: "Drop everything; ship fix urgently"
- name: "P1-high"
  color: "D93F0B"
  description: "Next release"
- name: "P2-medium"
  color: "FBCA04"
  description: "Planned but not urgent"
- name: "P3-low"
  color: "FEF2C0"
  description: "Backlog / nice-to-have"

# --- Status ---
- name: "status:needs-triage"
  color: "FFEB3B"
  description: "Awaiting initial review"
- name: "status:blocked"
  color: "F9D71C"
  description: "Blocked on external dependency"
- name: "status:in-progress"
  color: "F0AD4E"
  description: "Actively being worked on"
- name: "status:needs-design"
  color: "FFD54F"
  description: "Approach is unclear, design work needed"

# --- Effort ---
- name: "effort:XS"
  color: "EEEEEE"
  description: "<1h"
- name: "effort:S"
  color: "DDDDDD"
  description: "Half day"
- name: "effort:M"
  color: "BBBBBB"
  description: "1-2 days"
- name: "effort:L"
  color: "999999"
  description: "Several days"
- name: "effort:XL"
  color: "666666"
  description: "1+ week"

# --- Release target ---
- name: "release:v0.10"
  color: "0E8A16"
  description: "Targeted for v0.10.x"
- name: "release:v0.11"
  color: "2EA44F"
  description: "Targeted for v0.11.x"
- name: "release:v1.0"
  color: "238636"
  description: "Targeted for v1.0 stability cut"
- name: "release:backlog"
  color: "C8E6C9"
  description: "Unscheduled"
